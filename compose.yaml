services:
  njau-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: njau-proxy
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8787/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
